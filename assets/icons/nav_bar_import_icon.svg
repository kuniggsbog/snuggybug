  <line x1="-28" y1="-30" x2="8" y2="-30" stroke="#2A2D3A" stroke-width="2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(42, 45, 58);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="-28" y1="-16" x2="18" y2="-16" stroke="#2A2D3A" stroke-width="2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(42, 45, 58);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="-28" y1="-2" x2="12" y2="-2" stroke="#2A2D3A" stroke-width="2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(42, 45, 58);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

