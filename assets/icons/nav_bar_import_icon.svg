<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg">

<rect x="190" y="20" width="300" height="220" rx="20" fill="#12151E" stroke="#2A2D3A" stroke-width="1.5" style="fill:rgb(18, 21, 30);stroke:rgb(42, 45, 58);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<g transform="translate(340, 145)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">

  <!-- Document base -->
  <rect x="-45" y="-75" width="90" height="110" rx="6" fill="#1E2130" stroke="#3A3D4A" stroke-width="1.5" style="fill:rgb(30, 33, 48);stroke:rgb(58, 61, 74);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Folded corner -->
  <path d="M15,-75 L45,-45 L15,-45 Z" fill="#12151E" stroke="#3A3D4A" stroke-width="1" style="fill:rgb(18, 21, 30);stroke:rgb(58, 61, 74);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M15,-75 L45,-45" fill="none" stroke="#3A3D4A" stroke-width="1.5" style="fill:none;stroke:rgb(58, 61, 74);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

