<rect x="190" y="20" width="300" height="220" rx="20" fill="none" stroke="#2A2D3A" stroke-width="1.5" style="fill:none;stroke:rgb(42, 45, 58);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

